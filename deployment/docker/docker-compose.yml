version: "3.9"

services:
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    env_file:
      - ../../frontend/.env.example
    depends_on:
      - backend
    ports:
      - "3000:3000"

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    env_file:
      - ../../backend/.env.example
    depends_on:
      - postgres
      - ai-services
    ports:
      - "8000:8000"

  ai-services:
    build:
      context: ../../ai-services
      dockerfile: Dockerfile
    env_file:
      - ../../ai-services/.env.example
    ports:
      - "8100:8100"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sleepos
      POSTGRES_USER: sleepos
      POSTGRES_PASSWORD: sleepos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:

